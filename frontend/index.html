<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EV Service Desk — Delay Prediction Dashboard</title>
    <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>

  </style>
</head>
<body>

<div class="dash">

  <!-- ══ LEFT: Form ══ -->
  <aside class="left-panel">
    <div class="logo-bar">
      <h1>EV SERVICE DESK</h1>
      <p>Delay & wait time prediction</p>
    </div>

    <div class="form-panel">
      <div class="section-label">Appointment info</div>

      <div class="field">
        <label>Customer / vehicle ID</label>
        <input type="text" id="f-customer" placeholder="e.g. VH-2047 · Jane S." />
      </div>

      <div class="field-row">
        <div class="field">
          <label>Service date</label>
          <input type="date" id="f-date" />
        </div>
        <div class="field">
          <label>Service type</label>
          <select id="f-service">
            <option value="repair">Repair</option>
            <option value="maintenance">Maintenance</option>
            <option value="inspection">Inspection</option>
          </select>
        </div>
      </div>

      <div class="section-label">Capacity inputs</div>

      <div class="field-row">
        <div class="field">
          <label>Avg service time (min)</label>
          <input type="number" id="f-avg-time" value="90" min="1" />
        </div>
        <div class="field">
          <label>Appointments / day</label>
          <input type="number" id="f-appts" value="12" min="1" />
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>Service slots</label>
          <input type="number" id="f-slots" value="10" min="1" />
        </div>
        <div class="field">
          <label>Technicians</label>
          <input type="number" id="f-techs" value="4" min="1" />
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>Backlog size</label>
          <input type="number" id="f-backlog" value="3" min="0" />
        </div>
        <div class="field">
          <label>Demand / capacity ratio</label>
          <input type="number" id="f-dcr" value="1.1" step="0.01" min="0" />
        </div>
      </div>

      <div style="margin-top: 20px;">
        <button class="predict-btn" id="predict-btn" onclick="runPrediction()">
          Run prediction
        </button>
      </div>
    </div>

    <div class="api-url-bar">
      <div class="conn-dot" id="conn-dot"></div>
      <label>API</label>
      <input type="text" id="api-url" value="https://your-api-url.com" placeholder="https://your-api.com" />
    </div>
  </aside>

  <!-- ══ RIGHT: Stats + Queue ══ -->
  <main class="right-panel">

    <div class="top-stats">
      <div class="stat-card blue">
        <div class="s-label">In queue</div>
        <div class="s-val" id="stat-queue">0</div>
      </div>
      <div class="stat-card warn">
        <div class="s-label">At risk</div>
        <div class="s-val" id="stat-risk">0</div>
      </div>
      <div class="stat-card danger">
        <div class="s-label">Overdue</div>
        <div class="s-val" id="stat-over">0</div>
      </div>
      <div class="stat-card accent">
        <div class="s-label">Completed today</div>
        <div class="s-val" id="stat-done">0</div>
      </div>
    </div>

    <div class="result-strip" id="result-strip">
      <div>
        <div class="r-title">Delay risk</div>
        <div class="r-val" id="r-risk-val">—</div>
        <div id="r-risk-badge"></div>
      </div>
      <div class="r-divider"></div>
      <div>
        <div class="r-title">Est. wait time</div>
        <div class="r-val" id="r-wait-val">—</div>
        <div style="font-size:11px; color:var(--muted); margin-top:3px;" id="r-wait-label"></div>
      </div>
      <div class="r-divider"></div>
      <div style="flex:1;">
        <div class="r-title">Expected completion</div>
        <div class="r-val" style="font-size:14px;" id="r-completion">—</div>
      </div>
      <button class="add-queue-btn" onclick="addToQueue()">+ Add to queue</button>
    </div>

    <div class="queue-area">
      <div class="queue-header">
        <h2>LIVE QUEUE</h2>
        <span class="queue-count" id="q-count">0 appointments</span>
      </div>
      <div class="queue-list" id="queue-list">
        <div class="empty-queue">
          <div class="eq-icon">◫</div>
          <p>No appointments in queue yet.<br />Run a prediction and press <strong>+ Add to queue</strong>.</p>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
  const queue = [];
  let lastResult = null;
  let completedCount = 0;

  // Set today's date as default
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];

  // ── PREDICTION ──────────────────────────────────────────────────────────────
  async function runPrediction() {
    const btn = document.getElementById('predict-btn');
    btn.textContent = 'Running...';
    btn.classList.add('loading', 'pulsing');

    const apiUrl = document.getElementById('api-url').value.trim().replace(/\/$/, '');
    const dot    = document.getElementById('conn-dot');

    const payload = {
      service_type:           document.getElementById('f-service').value,
      date:                   document.getElementById('f-date').value,
      issue_type:             document.getElementById('f-service').value,
      avg_service_time:       parseFloat(document.getElementById('f-avg-time').value),
      appointments_per_day:   parseInt(document.getElementById('f-appts').value),
      service_slots:          parseInt(document.getElementById('f-slots').value),
      num_technicians:        parseInt(document.getElementById('f-techs').value),
      backlog_size:           parseInt(document.getElementById('f-backlog').value),
      demand_capacity_ratio:  parseFloat(document.getElementById('f-dcr').value)
    };

    try {
      const res = await fetch(`${apiUrl}/predict`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      dot.className = 'conn-dot live';
      showResult(data, payload);
    } catch (err) {
      // Demo fallback if API unreachable
      console.warn('API unreachable, using simulated result:', err.message);
      dot.className = 'conn-dot err';
      const dcr     = payload.demand_capacity_ratio;
      const simRisk = (dcr > 1.15 || payload.backlog_size > 5) ? 1 : 0;
      const simWait = Math.round(payload.avg_service_time * (0.8 + dcr * 0.4) + payload.backlog_size * 8);
      showResult({ delay_risk: simRisk, wait_time: simWait }, payload);
    }

    btn.textContent = 'Run prediction';
    btn.classList.remove('loading', 'pulsing');
  }

  // ── SHOW RESULT ─────────────────────────────────────────────────────────────
  function showResult(data, payload) {
    lastResult = { data, payload };
    document.getElementById('result-strip').className = 'result-strip visible';

    const riskVal = document.getElementById('r-risk-val');
    const badge   = document.getElementById('r-risk-badge');
    if (data.delay_risk === 1) {
      riskVal.className = 'r-val risk-high';
      riskVal.textContent = 'HIGH';
      badge.innerHTML = '<span class="risk-badge high">Delay likely</span>';
    } else {
      riskVal.className = 'r-val risk-low';
      riskVal.textContent = 'LOW';
      badge.innerHTML = '<span class="risk-badge low">On track</span>';
    }

    const wait = Math.round(data.wait_time);
    document.getElementById('r-wait-val').textContent = `${wait} min`;
    const hrs  = Math.floor(wait / 60), mins = wait % 60;
    document.getElementById('r-wait-label').textContent = hrs > 0 ? `${hrs}h ${mins}m total` : `${mins} minutes total`;

    const completion = new Date(Date.now() + wait * 60_000);
    document.getElementById('r-completion').textContent =
      completion.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) +
      ' · ' + completion.toLocaleDateString([], { month: 'short', day: 'numeric' });
  }

  // ── ADD TO QUEUE ────────────────────────────────────────────────────────────
  function addToQueue() {
    if (!lastResult) return;
    const { data, payload } = lastResult;
    const customer    = document.getElementById('f-customer').value.trim() || `Appt #${queue.length + 1}`;
    const startTime   = new Date();
    const expectedEnd = new Date(startTime.getTime() + Math.round(data.wait_time) * 60_000);

    queue.push({ id: Date.now(), customer, serviceType: payload.service_type,
      waitTime: Math.round(data.wait_time), delayRisk: data.delay_risk,
      startTime, expectedEnd, done: false });

    renderQueue();
    document.getElementById('f-customer').value = '';
    lastResult = null;
    document.getElementById('result-strip').className = 'result-strip';
  }

  // ── MARK DONE ───────────────────────────────────────────────────────────────
  function markDone(id) {
    const item = queue.find(q => q.id === id);
    if (!item || item.done) return;
    item.done = true;
    completedCount++;
    renderQueue();
  }

  // ── RENDER QUEUE ────────────────────────────────────────────────────────────
  function renderQueue() {
    const now    = new Date();
    const active = queue.filter(q => !q.done);
    const done   = queue.filter(q =>  q.done);
    const list   = document.getElementById('queue-list');

    updateStats(now);

    if (queue.length === 0) {
      list.innerHTML = `<div class="empty-queue"><div class="eq-icon">◫</div>
        <p>No appointments in queue yet.<br/>Run a prediction and press <strong>+ Add to queue</strong>.</p></div>`;
      document.getElementById('q-count').textContent = '0 appointments';
      return;
    }

    document.getElementById('q-count').textContent = `${active.length} active · ${done.length} done`;
    list.innerHTML = [...active, ...done].map(item => buildCard(item, now)).join('');
  }

  // ── BUILD CARD ──────────────────────────────────────────────────────────────
  function buildCard(item, now) {
    const overMin   = Math.round((now - item.expectedEnd) / 60_000);
    const remainMin = Math.round((item.expectedEnd - now) / 60_000);
    const isDone    = item.done;

    let statusClass = 'on-track', tagClass = 'tag-on-track', tagLabel = 'On track';
    let timeColor = 'green', subHtml = '';

    if (isDone) {
      statusClass = 'done'; tagClass = 'tag-done'; tagLabel = 'Completed'; timeColor = '';
    } else if (overMin > 0) {
      statusClass = 'overdue'; tagClass = 'tag-overdue'; tagLabel = 'Overdue';
      timeColor = 'red'; subHtml = `<div class="q-overrun">+${overMin} min over</div>`;
    } else if (item.delayRisk === 1 || remainMin < 15) {
      statusClass = 'at-risk'; tagClass = 'tag-at-risk'; tagLabel = 'At risk';
      timeColor = 'orange'; subHtml = `<div class="q-remain" style="color:var(--warn)">${remainMin}m remaining</div>`;
    } else {
      subHtml = `<div class="q-remain">${remainMin}m remaining</div>`;
    }

    const icons   = { repair: '⚙', maintenance: '◈', inspection: '◎' };
    const endTime = item.expectedEnd.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    return `<div class="q-item ${statusClass}" onclick="markDone(${item.id})" title="Click to mark complete">
      <div>
        <div class="q-name">${esc(item.customer)}</div>
        <div class="q-meta">
          <span>${icons[item.serviceType] || '◻'} ${item.serviceType}</span>
          <span>≈ ${item.waitTime} min</span>
          <span>Started ${item.startTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
        </div>
        <span class="q-status-tag ${tagClass}">${tagLabel}</span>
      </div>
      <div class="q-right">
        <div class="q-time ${timeColor}">${endTime}</div>
        ${subHtml}
      </div>
      ${!isDone ? '<div class="complete-hint">tap to complete ✓</div>' : ''}
    </div>`;
  }

  // ── STATS ───────────────────────────────────────────────────────────────────
  function updateStats(now) {
    const active  = queue.filter(q => !q.done);
    document.getElementById('stat-queue').textContent = active.length;
    document.getElementById('stat-risk').textContent  = active.filter(q => q.delayRisk === 1).length;
    document.getElementById('stat-over').textContent  = active.filter(q => now > q.expectedEnd).length;
    document.getElementById('stat-done').textContent  = completedCount;
  }

  // Prevent XSS from customer name input
  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Auto-refresh every 30s to update overdue/remaining times
  setInterval(() => { if (queue.length > 0) renderQueue(); }, 30_000);
</script>
</body>
</html>
